<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/select.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/icons.css">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="js/app.js" type="module" defer></script>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="container">
        <section class="left">
            <div class="main-details">
                <h2 class="date" id="Date"></h2>
                <div class="weather-case" id="weatherCase">

                </div>
            </div>
            <div class="temp-details" id="tempDetails">
                <div class="temp-card glass-effect">
                </div>
        </section>
        <section class="right glass-effect">
            <div class="search-container">
                <select name="country-code" id="country-select" style="outline: none;">

                </select>
            </div>
            <div class="current-weather">
                <span class="temp" id="currentTemp"></span>
                <span class="wind" id="windSpeed" style="text-align: center;">

                </span>
            </div>
            <div class="next-day-forecast">
                <h3>the next days forecast</h3>
                <div class="day-forecasts" id="forecast">

                </div>
            </div>
        </section>
    </main>
    <div id="loader">
        <div class="spinner"></div>
    </div>
</body>

</html>
